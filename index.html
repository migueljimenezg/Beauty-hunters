<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="Beauty Hunters" />
<meta name="theme-color" content="#5B2E8C" />
<title>Beauty Hunters · Móvil</title>

<!-- Manifest embebido como data URI para que sea un solo archivo -->
<link rel="manifest" href='data:application/manifest+json,{"name":"Beauty Hunters Móvil","short_name":"Beauty Hunters","start_url":".","display":"standalone","background_color":"%23F4EFF7","theme_color":"%235B2E8C","icons":[]}' />

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600&family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
  :root{
    --bg:#F4EFF7; --cream:#FBF8FC; --card:#FFFFFF;
    --border:#E5DCEB; --borderStrong:#C9B8D8;
    --ink:#1F1230; --inkSoft:#4A3560; --muted:#7B6589; --faint:#A695B5;
    --primary:#5B2E8C; --primarySoft:#8B5FBF;
    --lilac:#B89CD8; --lilacBg:#EADEF5; --lilacGlow:#F0E5FA;
    --gold:#B89968;
    --success:#4A7C5A; --successBg:#E0EBE3;
    --danger:#A8516A; --dangerBg:#F2DDE3;
    --warning:#C28A3E; --warningBg:#F7EDD8;
    --serif:'Fraunces',Georgia,serif;
    --display:'Playfair Display',Georgia,serif;
    --sans:'DM Sans',system-ui,sans-serif;
    --safe-top:env(safe-area-inset-top,0px);
    --safe-bottom:env(safe-area-inset-bottom,0px);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{
    font-family:var(--sans); background:var(--bg); color:var(--ink);
    -webkit-font-smoothing:antialiased; font-size:15px; line-height:1.45;
    overscroll-behavior-y:none;
  }
  button{font-family:var(--sans); cursor:pointer; border:none; background:none; color:inherit;}
  input{font-family:var(--sans);}
  a{color:var(--primary); text-decoration:none;}

  /* ─── Top bar ─── */
  .topbar{
    position:sticky; top:0; z-index:50;
    padding:calc(var(--safe-top) + 12px) 16px 12px;
    background:rgba(244,239,247,0.85); backdrop-filter:saturate(180%) blur(14px);
    -webkit-backdrop-filter:saturate(180%) blur(14px);
    border-bottom:1px solid var(--border);
  }
  .brand{display:flex; align-items:center; justify-content:space-between; gap:10px;}
  .wordmark{
    font-family:var(--display); font-weight:500; font-size:18px;
    letter-spacing:0.14em; text-transform:uppercase; color:var(--primary);
    line-height:1;
  }
  .wordmark small{display:block; font-size:8.5px; letter-spacing:0.42em; color:var(--muted); margin-top:3px; font-weight:600;}
  .trm-chip{
    display:inline-flex; align-items:center; gap:5px; padding:6px 10px;
    background:var(--lilacBg); border:1px solid var(--borderStrong); border-radius:999px;
    font-size:11px; font-weight:600; color:var(--inkSoft); white-space:nowrap;
  }
  .trm-chip b{color:var(--primary); font-weight:700;}

  /* ─── Search + filters ─── */
  .controls{padding:12px 16px 4px;}
  .search{position:relative;}
  .search input{
    width:100%; padding:11px 14px 11px 38px; border-radius:13px;
    border:1px solid var(--border); background:var(--card); font-size:15px; color:var(--ink);
    outline:none;
  }
  .search input:focus{border-color:var(--primarySoft); box-shadow:0 0 0 3px var(--lilacGlow);}
  .search svg{position:absolute; left:13px; top:50%; transform:translateY(-50%); color:var(--faint);}

  .chips{display:flex; gap:7px; overflow-x:auto; padding:11px 0 3px; -webkit-overflow-scrolling:touch; scrollbar-width:none;}
  .chips::-webkit-scrollbar{display:none;}
  .chip{
    flex:0 0 auto; padding:7px 13px; border-radius:999px; font-size:12.5px; font-weight:600;
    background:var(--card); border:1px solid var(--border); color:var(--muted); white-space:nowrap;
    transition:.12s;
  }
  .chip.active{background:var(--primary); border-color:var(--primary); color:#fff;}

  .count{padding:9px 16px 4px; font-size:11.5px; color:var(--muted); letter-spacing:0.04em; text-transform:uppercase; font-weight:600;}

  /* ─── Product list ─── */
  .list{padding:6px 12px 40px;}
  .pcard{
    display:flex; gap:13px; align-items:center; padding:12px;
    background:var(--card); border:1px solid var(--border); border-radius:16px;
    margin-bottom:10px; transition:.12s;
  }
  .pcard:active{transform:scale(0.985); background:var(--cream);}
  .thumb{
    width:62px; height:62px; flex:0 0 62px; border-radius:12px; object-fit:cover;
    background:var(--lilacBg); border:1px solid var(--border);
    display:flex; align-items:center; justify-content:center; color:var(--lilac); overflow:hidden;
  }
  .pcard-body{flex:1; min-width:0;}
  .pbrand{font-size:10.5px; letter-spacing:0.1em; text-transform:uppercase; color:var(--primarySoft); font-weight:700;}
  .pname{font-family:var(--serif); font-weight:500; font-size:15.5px; color:var(--ink); margin:1px 0 5px; line-height:1.25;
         white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .pmeta{display:flex; gap:6px; flex-wrap:wrap; align-items:center;}
  .tag{font-size:10.5px; font-weight:600; padding:3px 7px; border-radius:7px; white-space:nowrap;}
  .tag-stock{background:var(--lilacBg); color:var(--inkSoft);}
  .tag-margin{background:var(--successBg); color:var(--success);}
  .tag-margin.low{background:var(--warningBg); color:var(--warning);}
  .tag-margin.neg{background:var(--dangerBg); color:var(--danger);}
  .tag-new{background:var(--goldSoft,#D4B98A); color:#5a4520; background:#F2EAD8;}
  .chev{color:var(--faint); flex:0 0 auto;}

  /* ─── Detail sheet ─── */
  .detail{
    position:fixed; inset:0; z-index:100; background:var(--bg);
    transform:translateX(100%); transition:transform .26s cubic-bezier(.32,.72,0,1);
    overflow-y:auto; -webkit-overflow-scrolling:touch;
  }
  .detail.open{transform:translateX(0);}
  .dhead{
    position:sticky; top:0; z-index:10;
    padding:calc(var(--safe-top) + 10px) 14px 10px;
    background:rgba(244,239,247,0.9); backdrop-filter:blur(14px); -webkit-backdrop-filter:blur(14px);
    border-bottom:1px solid var(--border); display:flex; align-items:center; gap:10px;
  }
  .back{display:flex; align-items:center; gap:4px; font-weight:600; font-size:14px; color:var(--primary); padding:6px 4px;}
  .dwrap{padding:14px 16px calc(var(--safe-bottom) + 40px);}

  .gallery{display:flex; gap:8px; overflow-x:auto; padding-bottom:6px; margin:0 -16px 14px; padding-left:16px; padding-right:16px; scrollbar-width:none;}
  .gallery::-webkit-scrollbar{display:none;}
  .gallery img{height:190px; border-radius:14px; border:1px solid var(--border); object-fit:cover;}
  .gallery .ph{height:190px; width:150px; flex:0 0 150px; border-radius:14px; background:var(--lilacBg);
    display:flex; align-items:center; justify-content:center; color:var(--lilac); border:1px solid var(--border);}

  .dbrand{font-size:11px; letter-spacing:0.12em; text-transform:uppercase; color:var(--primarySoft); font-weight:700;}
  .dname{font-family:var(--serif); font-weight:600; font-size:23px; line-height:1.18; margin:3px 0 4px; color:var(--ink);}
  .dsku{font-size:12px; color:var(--muted);}

  .card{background:var(--card); border:1px solid var(--border); border-radius:16px; padding:15px; margin-top:13px;}
  .card-title{font-size:11px; letter-spacing:0.1em; text-transform:uppercase; color:var(--muted); font-weight:700; margin-bottom:11px;}

  /* Calculadora viabilidad */
  .calc-card{background:linear-gradient(160deg,#fff, #FBF6FF); border:1.5px solid var(--borderStrong);}
  .seg{display:flex; background:var(--lilacBg); border-radius:11px; padding:3px; margin-bottom:11px;}
  .seg button{flex:1; padding:8px; border-radius:8px; font-weight:600; font-size:13px; color:var(--inkSoft);}
  .seg button.on{background:#fff; color:var(--primary); box-shadow:0 1px 4px rgba(91,46,140,.12);}
  .inrow{display:flex; gap:9px; margin-bottom:11px;}
  .inrow .fld{flex:1;}
  .fld label{display:block; font-size:11px; font-weight:600; color:var(--muted); margin-bottom:4px;}
  .fld input{
    width:100%; padding:11px 12px; border-radius:11px; border:1px solid var(--border);
    background:#fff; font-size:16px; font-weight:600; color:var(--ink); outline:none;
  }
  .fld input:focus{border-color:var(--primarySoft); box-shadow:0 0 0 3px var(--lilacGlow);}
  .fld.tiny{flex:0 0 92px;}

  .result{display:flex; gap:10px; margin-top:4px;}
  .result .box{flex:1; text-align:center; padding:13px 8px; border-radius:13px;}
  .box-profit{background:var(--successBg);}
  .box-profit.neg{background:var(--dangerBg);}
  .box-margin{background:var(--lilacBg);}
  .box .lbl{font-size:10.5px; text-transform:uppercase; letter-spacing:0.06em; font-weight:700; color:var(--muted); margin-bottom:3px;}
  .box .val{font-family:var(--serif); font-weight:600; font-size:21px; line-height:1; color:var(--ink); white-space:nowrap;}
  .box-profit .val{color:var(--success);} .box-profit.neg .val{color:var(--danger);}
  .box-margin .val{color:var(--primary);}
  .verdict{margin-top:12px; padding:11px 13px; border-radius:12px; font-size:13.5px; font-weight:600; display:flex; gap:8px; align-items:center;}
  .v-good{background:var(--successBg); color:var(--success);}
  .v-mid{background:var(--warningBg); color:var(--warning);}
  .v-bad{background:var(--dangerBg); color:var(--danger);}
  .suggest{font-size:11.5px; color:var(--muted); margin-top:9px;}
  .suggest b{color:var(--inkSoft);}

  /* Datos */
  .row{display:flex; justify-content:space-between; align-items:baseline; padding:9px 0; border-bottom:1px solid var(--border);}
  .row:last-child{border-bottom:none;}
  .row .k{font-size:13px; color:var(--muted);}
  .row .v{font-size:14.5px; font-weight:600; color:var(--ink); text-align:right;}
  .row .v small{display:block; font-size:11px; color:var(--muted); font-weight:500;}

  /* Competidores */
  .comp{display:flex; align-items:center; gap:10px; padding:10px 0; border-bottom:1px solid var(--border);}
  .comp:last-child{border-bottom:none;}
  .comp-rank{width:22px; height:22px; flex:0 0 22px; border-radius:7px; background:var(--lilacBg); color:var(--primary);
    font-size:11px; font-weight:700; display:flex; align-items:center; justify-content:center;}
  .comp.cheapest .comp-rank{background:var(--primary); color:#fff;}
  .comp-body{flex:1; min-width:0;}
  .comp-name{font-size:13.5px; font-weight:600; color:var(--ink);}
  .comp-name small{color:var(--muted); font-weight:500;}
  .comp-note{font-size:11.5px; color:var(--muted); margin-top:1px;}
  .comp-price{font-size:14.5px; font-weight:700; color:var(--ink); text-align:right; white-space:nowrap;}
  .comp-link{flex:0 0 auto; width:34px; height:34px; border-radius:10px; background:var(--lilacBg);
    display:flex; align-items:center; justify-content:center; color:var(--primary);}

  .stock-big{display:flex; align-items:center; gap:14px;}
  .stock-num{font-family:var(--serif); font-weight:600; font-size:38px; line-height:1; color:var(--primary);}
  .stock-cap{font-size:13px; color:var(--muted);}
  .reco{margin-top:11px; padding:11px 13px; border-radius:12px; font-size:13px; font-weight:600;}
  .reco-buy{background:var(--successBg); color:var(--success);}
  .reco-hold{background:var(--warningBg); color:var(--warning);}
  .reco-stop{background:var(--dangerBg); color:var(--danger);}

  /* ─── Empty / loader ─── */
  .empty{padding:70px 30px; text-align:center;}
  .empty .ico{width:64px; height:64px; margin:0 auto 18px; border-radius:18px; background:var(--lilacBg);
    display:flex; align-items:center; justify-content:center; color:var(--primarySoft);}
  .empty h2{font-family:var(--serif); font-weight:600; font-size:20px; color:var(--ink); margin:0 0 7px;}
  .empty p{color:var(--muted); font-size:14px; margin:0 0 22px; line-height:1.5;}
  .btn{display:inline-flex; align-items:center; gap:8px; padding:13px 22px; border-radius:13px;
    background:var(--primary); color:#fff; font-weight:600; font-size:15px;}
  .btn:active{background:#4a2473;}
  .btn-ghost{background:var(--card); color:var(--primary); border:1px solid var(--borderStrong);}

  .sync-info{font-size:12px; color:var(--muted); margin-top:16px; line-height:1.6;}
  .sync-info b{color:var(--inkSoft);}

  /* ─── Update bar ─── */
  .updatebar{padding:12px 16px calc(var(--safe-bottom) + 12px); position:sticky; bottom:0;
    background:linear-gradient(to top, var(--bg), rgba(244,239,247,0)); display:flex; gap:10px; z-index:40;}
  .updatebar .btn{flex:1; justify-content:center;}

  .toast{position:fixed; left:50%; bottom:calc(var(--safe-bottom) + 24px); transform:translateX(-50%) translateY(80px);
    background:var(--ink); color:#fff; padding:12px 20px; border-radius:13px; font-size:14px; font-weight:500;
    z-index:200; transition:transform .3s cubic-bezier(.32,.72,0,1); max-width:88%; text-align:center; opacity:.97;}
  .toast.show{transform:translateX(-50%) translateY(0);}

  .stamp{text-align:center; font-size:11px; color:var(--faint); padding:18px 16px 8px;}
</style>
</head>
<body>

<div id="app"></div>

<input type="file" id="fileInput" accept="application/json,.json" style="display:none" />
<div class="toast" id="toast"></div>

<script>
// ═══════════════════════════════════════════════════════════════════
// Beauty Hunters Móvil · PWA de viabilidad para tiendas
// Un solo archivo. Datos vía Google Drive (app Archivos) → localStorage.
// ═══════════════════════════════════════════════════════════════════

const LS_KEY = 'bh_movil_data_v1';
const ICON = {
  search:'<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>',
  chev:'<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg>',
  back:'<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>',
  img:'<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="18" height="18" rx="3"/><circle cx="8.5" cy="8.5" r="1.6"/><path d="M21 15l-5-5L5 21"/></svg>',
  link:'<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7 0l3-3a5 5 0 0 0-7-7l-1 1"/><path d="M14 11a5 5 0 0 0-7 0l-3 3a5 5 0 0 0 7 7l1-1"/></svg>',
  upload:'<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><path d="M17 8l-5-5-5 5"/><path d="M12 3v12"/></svg>',
  box:'<svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M21 8l-9-5-9 5 9 5 9-5z"/><path d="M3 8v8l9 5 9-5V8"/><path d="M12 13v8"/></svg>',
  calc:'<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="4" y="2" width="16" height="20" rx="2"/><path d="M8 6h8M8 10h2M12 10h2M16 10h0M8 14h2M12 14h2M8 18h6"/></svg>',
};

// ─── Estado ───
let DATA = null;        // payload completo
let view = {
  search:'', cat:'', brand:'', sort:'name',
  selectedId:null,
  calc:{ cost:'', currency:'USD', trm:4050, sale:'' },
};

// ─── Utilidades ───
const fmtCOP = n => {
  const v = Math.round(Number(n)||0);
  return '$' + v.toLocaleString('es-CO');
};
const fmtUSD = n => 'US$' + (Number(n)||0).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
const esc = s => String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const fmtDate = s => { if(!s) return '—'; const [y,m,d]=s.split('-'); const M=['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic']; return `${d} ${M[(+m||1)-1]} ${y}`; };

function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove('show'),2400);
}

// ─── Persistencia ───
function loadData(){
  try{ const raw=localStorage.getItem(LS_KEY); if(raw){ DATA=JSON.parse(raw); if(DATA.globalTRM) view.calc.trm=DATA.globalTRM; } }catch(e){ DATA=null; }
}
function saveData(payload){
  DATA=payload;
  if(payload.globalTRM) view.calc.trm=payload.globalTRM;
  try{ localStorage.setItem(LS_KEY, JSON.stringify(payload)); }
  catch(e){ toast('Datos muy grandes para guardar offline'); }
}

// ─── Import de archivo (Google Drive vía app Archivos) ───
document.getElementById('fileInput').addEventListener('change', e=>{
  const file=e.target.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=()=>{
    try{
      const payload=JSON.parse(reader.result);
      if(!payload.products || !Array.isArray(payload.products)) throw 0;
      saveData(payload);
      view.selectedId=null;
      render();
      toast('✓ '+payload.products.length+' productos actualizados');
    }catch(err){ toast('Archivo no válido'); }
  };
  reader.readAsText(file);
  e.target.value='';
});
function pickFile(){ document.getElementById('fileInput').click(); }

// ─── Cálculo de viabilidad ───
function computeViability(c){
  const trm = Number(c.trm)||4050;
  const costCOP = c.currency==='USD' ? (Number(c.cost)||0)*trm : (Number(c.cost)||0);
  const sale = Number(c.sale)||0;
  if(costCOP<=0 || sale<=0) return null;
  const profit = sale - costCOP;
  const margin = (profit/costCOP)*100;
  return { costCOP, sale, profit, margin };
}

// ─── Métricas para tarjeta de lista (margen rápido) ───
function quickMargin(p){
  const cost = p.lastUnitCostCOP || p.cheapestSupplierCostCOP || 0;
  const ref = p.salePriceCOP || p.cheapestCompetitorPriceCOP || 0;
  if(cost<=0 || ref<=0) return null;
  return ((ref-cost)/cost)*100;
}

// ─── Filtros ───
function filteredProducts(){
  const q=view.search.toLowerCase().trim();
  let list=(DATA?.products||[]).filter(p=>{
    if(view.cat && p.category!==view.cat) return false;
    if(view.brand && p.brand!==view.brand) return false;
    if(!q) return true;
    return (p.brand||'').toLowerCase().includes(q)
        || (p.productName||'').toLowerCase().includes(q)
        || (p.sku||'').toLowerCase().includes(q);
  });
  const S={
    name:(a,b)=>(a.brand+a.productName).localeCompare(b.brand+b.productName),
    margin:(a,b)=>(quickMargin(b)??-999)-(quickMargin(a)??-999),
    stock:(a,b)=>(b.totalUnits||0)-(a.totalUnits||0),
    lowstock:(a,b)=>(a.totalUnits||0)-(b.totalUnits||0),
  };
  return [...list].sort(S[view.sort]||S.name);
}

// ═══════════════════════════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════════════════════════
function render(){
  const app=document.getElementById('app');
  if(!DATA){ app.innerHTML=renderEmpty(); return; }
  app.innerHTML = renderTopbar() + renderControls() + renderList() + renderUpdateBar() + renderStamp();
  if(view.selectedId) renderDetail();
  bindControls();
}

function renderTopbar(){
  return `<div class="topbar"><div class="brand">
    <div class="wordmark">Beauty Hunters<small>VIABILIDAD MÓVIL</small></div>
    <div class="trm-chip">TRM <b>${fmtCOP(DATA.globalTRM).replace('$','$')}</b></div>
  </div></div>`;
}

function renderControls(){
  const brands=DATA.brands||[];
  const catChip=(val,lbl)=>`<button class="chip ${view.cat===val?'active':''}" data-cat="${val}">${lbl}</button>`;
  const sortChip=(val,lbl)=>`<button class="chip ${view.sort===val?'active':''}" data-sort="${val}">${lbl}</button>`;
  const brandSel = brands.length ? `<select id="brandSel" class="chip" style="appearance:none;padding-right:26px;background-image:url('data:image/svg+xml;utf8,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%2210%22 height=%2210%22 fill=%22none%22 stroke=%22%237B6589%22 stroke-width=%222%22><path d=%22M2 3l3 3 3-3%22/></svg>');background-repeat:no-repeat;background-position:right 9px center;${view.brand?'background:#5B2E8C;color:#fff;border-color:#5B2E8C':''}">
      <option value="">Todas las marcas</option>
      ${brands.map(b=>`<option value="${esc(b)}" ${view.brand===b?'selected':''}>${esc(b)}</option>`).join('')}
    </select>` : '';

  return `<div class="controls">
    <div class="search">${ICON.search}<input id="searchInput" type="search" placeholder="Buscar marca, producto o SKU…" value="${esc(view.search)}" autocomplete="off" autocorrect="off" autocapitalize="none"/></div>
    <div class="chips">
      ${catChip('','Todo')}${catChip('makeup','Maquillaje')}${catChip('skincare','Skincare')}
      ${brandSel}
    </div>
    <div class="chips">
      <span style="flex:0 0 auto;font-size:11px;color:var(--muted);font-weight:600;align-self:center;padding-right:2px;">ORDENAR</span>
      ${sortChip('name','A–Z')}${sortChip('margin','Mejor margen')}${sortChip('stock','Más stock')}${sortChip('lowstock','Menos stock')}
    </div>
  </div>`;
}

function renderList(){
  const list=filteredProducts();
  if(!list.length) return `<div class="count">Sin resultados</div><div class="empty" style="padding:50px 30px;"><p style="color:var(--muted)">No hay productos que coincidan con tu búsqueda.</p></div>`;
  const rows=list.map(p=>{
    const m=quickMargin(p);
    const mCls = m==null?'' : m<0?'neg' : m<30?'low':'';
    const mTxt = m==null?'Sin margen' : `${m>=0?'+':''}${Math.round(m)}% margen`;
    const photo = (p.photos&&p.photos[0]) ? `<img class="thumb" src="${p.photos[0]}" alt=""/>` : `<div class="thumb">${ICON.img}</div>`;
    const stockTag = p.totalUnits>0
      ? `<span class="tag tag-stock">${p.totalUnits} comprados</span>`
      : `<span class="tag tag-new">Nunca comprado</span>`;
    return `<div class="pcard" data-id="${p.id}">
      ${photo}
      <div class="pcard-body">
        <div class="pbrand">${esc(p.brand)}</div>
        <div class="pname">${esc(p.productName)}</div>
        <div class="pmeta">
          ${stockTag}
          ${m!=null?`<span class="tag tag-margin ${mCls}">${mTxt}</span>`:''}
        </div>
      </div>
      <div class="chev">${ICON.chev}</div>
    </div>`;
  }).join('');
  return `<div class="count">${list.length} producto${list.length!==1?'s':''}</div><div class="list">${rows}</div>`;
}

function renderUpdateBar(){
  return `<div class="updatebar">
    <button class="btn btn-ghost" onclick="pickFile()">${ICON.upload} Actualizar datos</button>
  </div>`;
}
function renderStamp(){
  if(!DATA.generatedAt) return '';
  const d=new Date(DATA.generatedAt);
  return `<div class="stamp">Datos del ${d.toLocaleDateString('es-CO',{day:'numeric',month:'long',year:'numeric'})} · ${d.toLocaleTimeString('es-CO',{hour:'2-digit',minute:'2-digit'})}</div>`;
}

function renderEmpty(){
  return `<div class="topbar"><div class="brand"><div class="wordmark">Beauty Hunters<small>VIABILIDAD MÓVIL</small></div></div></div>
  <div class="empty">
    <div class="ico">${ICON.box}</div>
    <h2>Carga tu catálogo</h2>
    <p>Aún no hay datos en este dispositivo. Importa el archivo <b>beauty-hunters-movil.json</b> desde Google Drive para empezar.</p>
    <button class="btn" onclick="pickFile()">${ICON.upload} Importar desde Google Drive</button>
    <div class="sync-info">
      <b>Cómo hacerlo:</b><br>
      1. En Beauty Hunters (PC) genera el archivo y súbelo a Google Drive.<br>
      2. Aquí toca <b>Importar</b> → <b>Examinar</b> → <b>Google Drive</b>.<br>
      3. Elige <b>beauty-hunters-movil.json</b>.<br>
      Los datos quedan guardados y funcionan <b>sin internet</b>.
    </div>
  </div>`;
}

// ─── Detalle ───
function renderDetail(){
  const p=(DATA.products||[]).find(x=>x.id===view.selectedId);
  if(!p) return;
  // sugerir precio venta por defecto
  if(view.calc.sale==='' && !view.calc._touchedSale){
    const def = p.salePriceCOP || p.cheapestCompetitorPriceCOP || 0;
    if(def>0) view.calc.sale=String(Math.round(def));
  }
  // sugerir costo por defecto
  if(view.calc.cost==='' && !view.calc._touchedCost){
    if(p.lastUnitCostUSD>0){ view.calc.cost=p.lastUnitCostUSD.toFixed(2); view.calc.currency='USD'; }
    else if(p.cheapestSupplierCostUSD>0){ view.calc.cost=p.cheapestSupplierCostUSD.toFixed(2); view.calc.currency='USD'; }
    else if(p.lastUnitCostCOP>0){ view.calc.cost=String(Math.round(p.lastUnitCostCOP)); view.calc.currency='COP'; }
  }

  const r=computeViability(view.calc);

  // galería
  const gallery = (p.photos&&p.photos.length)
    ? p.photos.map(ph=>`<img src="${ph}" alt=""/>`).join('')
    : `<div class="ph">${ICON.img}</div>`;

  // verdict
  let verdict='';
  if(r){
    let cls,txt;
    if(r.margin>=50){cls='v-good';txt='Excelente compra · margen alto';}
    else if(r.margin>=30){cls='v-good';txt='Buena compra';}
    else if(r.margin>=15){cls='v-mid';txt='Margen ajustado · evalúa';}
    else if(r.margin>=0){cls='v-bad';txt='Margen muy bajo · cuidado';}
    else {cls='v-bad';txt='Pérdida · no comprar a este precio';}
    verdict=`<div class="verdict ${cls}">${txt}</div>`;
  }

  // referencias rápidas
  const ref = p.referencePriceUSD>0 ? `${fmtUSD(p.referencePriceUSD)} <small>${fmtCOP(p.referencePriceUSD*(DATA.globalTRM||4050))}</small>` : '—';
  const last = p.lastUnitCostBaseCOP>0
    ? `${fmtCOP(p.lastUnitCostBaseCOP)} <small>${p.lastUnitCostBaseUSD>0?fmtUSD(p.lastUnitCostBaseUSD)+' · ':''}${fmtDate(p.lastPurchaseDate)}</small>`
    : (p.cheapestSupplierCostCOP>0 ? `${fmtCOP(p.cheapestSupplierCostCOP)} <small>estimado proveedor</small>` : 'Sin compras');
  const cheapestComp = p.cheapestCompetitorPriceCOP>0 ? fmtCOP(p.cheapestCompetitorPriceCOP) : '—';

  // competidores
  const comps=(p.competitors||[]).filter(c=>c.priceCOP>0||c.notes||c.link);
  const compRows = comps.length ? comps.map((c,i)=>{
    const cheapest = c.priceCOP>0 && c.priceCOP===p.cheapestCompetitorPriceCOP;
    const sizeTxt = c.size?` · ${esc(c.size)}`:'';
    return `<div class="comp ${cheapest?'cheapest':''}">
      <div class="comp-rank">${i+1}</div>
      <div class="comp-body">
        <div class="comp-name">${esc(c.name)}${cheapest?' <small>· más barato</small>':''}<small>${sizeTxt}</small></div>
        ${c.notes?`<div class="comp-note">${esc(c.notes)}</div>`:''}
      </div>
      <div class="comp-price">${c.priceCOP>0?fmtCOP(c.priceCOP):'—'}</div>
      ${c.link?`<a class="comp-link" href="${esc(c.link)}" target="_blank" rel="noopener">${ICON.link}</a>`:''}
    </div>`;
  }).join('') : `<div style="color:var(--muted);font-size:13px;padding:4px 0;">Sin precios de competidores registrados.</div>`;

  // recomendación de inventario
  let reco='';
  const m=quickMargin(p);
  if(p.totalUnits===0){
    reco=`<div class="reco reco-buy">Nunca lo has comprado — si el margen es bueno, vale la pena probar.</div>`;
  }else if(m!=null && m>=40){
    reco=`<div class="reco reco-buy">Buen margen y rota — conviene reabastecer.</div>`;
  }else if(m!=null && m<15){
    reco=`<div class="reco reco-stop">Margen bajo — considera dejar de comprarlo.</div>`;
  }else{
    reco=`<div class="reco reco-hold">Margen medio — compra con cuidado según rotación.</div>`;
  }

  const sheet=document.createElement('div');
  sheet.className='detail';
  sheet.id='detailSheet';
  sheet.innerHTML=`
    <div class="dhead"><button class="back" id="backBtn">${ICON.back} Catálogo</button></div>
    <div class="dwrap">
      <div class="gallery">${gallery}</div>
      <div class="dbrand">${esc(p.brand)}</div>
      <div class="dname">${esc(p.productName)}</div>
      <div class="dsku">${p.sku?'SKU '+esc(p.sku)+' · ':''}${p.category==='skincare'?'Skincare':'Maquillaje'}${p.sizes&&p.sizes.length?' · '+p.sizes.map(esc).join(', '):''}</div>

      <!-- CALCULADORA -->
      <div class="card calc-card">
        <div class="card-title">${ICON.calc} Calcular viabilidad</div>
        <div class="seg">
          <button data-cur="USD" class="${view.calc.currency==='USD'?'on':''}">Precio en US$</button>
          <button data-cur="COP" class="${view.calc.currency==='COP'?'on':''}">Precio en COP</button>
        </div>
        <div class="inrow">
          <div class="fld" style="flex:1"><label>Costo en tienda (${view.calc.currency})</label>
            <input id="costIn" type="number" inputmode="decimal" placeholder="0" value="${esc(view.calc.cost)}"/></div>
          ${view.calc.currency==='USD'?`<div class="fld tiny"><label>TRM</label><input id="trmIn" type="number" inputmode="numeric" value="${esc(view.calc.trm)}"/></div>`:''}
        </div>
        <div class="fld" style="margin-bottom:12px"><label>Precio de venta (COP)</label>
          <input id="saleIn" type="number" inputmode="numeric" placeholder="0" value="${esc(view.calc.sale)}"/></div>

        ${r ? `<div class="result">
          <div class="box box-profit ${r.profit<0?'neg':''}"><div class="lbl">Ganancia</div><div class="val">${fmtCOP(r.profit)}</div></div>
          <div class="box box-margin"><div class="lbl">Margen</div><div class="val">${r.margin>=0?'+':''}${Math.round(r.margin)}%</div></div>
        </div>${verdict}` : `<div style="color:var(--muted);font-size:13px;text-align:center;padding:6px 0;">Ingresa costo y precio de venta para ver la ganancia.</div>`}

        ${p.cheapestCompetitorPriceCOP>0?`<div class="suggest">💡 Competidor más barato: <b>${fmtCOP(p.cheapestCompetitorPriceCOP)}</b>${p.salePriceCOP>0?` · Tu precio sugerido: <b>${fmtCOP(p.salePriceCOP)}</b>`:''}</div>`:''}
      </div>

      <!-- REFERENCIAS -->
      <div class="card">
        <div class="card-title">Referencias de precio</div>
        <div class="row"><div class="k">Precio referencia</div><div class="v">${ref}</div></div>
        <div class="row"><div class="k">Última compra</div><div class="v">${last}</div></div>
        <div class="row"><div class="k">Competidor más barato</div><div class="v">${cheapestComp}</div></div>
        ${p.referenceLink?`<div class="row"><div class="k">${esc(p.referenceLinkLabel||'Ver en tienda')}</div><div class="v"><a href="${esc(p.referenceLink)}" target="_blank" rel="noopener">Abrir ${ICON.link}</a></div></div>`:''}
      </div>

      <!-- INVENTARIO -->
      <div class="card">
        <div class="card-title">Cuánto has comprado</div>
        <div class="stock-big">
          <div class="stock-num">${p.totalUnits||0}</div>
          <div class="stock-cap">unidades compradas en total<br>${p.purchaseCount||0} pedido${p.purchaseCount!==1?'s':''}</div>
        </div>
        ${reco}
      </div>

      <!-- COMPETIDORES -->
      <div class="card">
        <div class="card-title">Competidores (${comps.length})</div>
        ${compRows}
      </div>
    </div>`;
  document.body.appendChild(sheet);
  requestAnimationFrame(()=>sheet.classList.add('open'));

  // binds del detalle
  sheet.querySelector('#backBtn').onclick=closeDetail;
  const reRender=()=>{ // recalcula sólo el bloque de resultado sin recrear todo
    const nr=computeViability(view.calc);
    const card=sheet.querySelector('.calc-card');
    // re-render simple: regenerar la hoja entera preservando scroll
    const sc=sheet.scrollTop;
    sheet.remove();
    renderDetail();
    const ns=document.getElementById('detailSheet');
    if(ns){ ns.classList.add('open'); ns.scrollTop=sc; }
  };
  const costIn=sheet.querySelector('#costIn');
  if(costIn) costIn.oninput=e=>{ view.calc.cost=e.target.value; view.calc._touchedCost=true; updateResult(sheet); };
  const saleIn=sheet.querySelector('#saleIn');
  if(saleIn) saleIn.oninput=e=>{ view.calc.sale=e.target.value; view.calc._touchedSale=true; updateResult(sheet); };
  const trmIn=sheet.querySelector('#trmIn');
  if(trmIn) trmIn.oninput=e=>{ view.calc.trm=e.target.value; updateResult(sheet); };
  sheet.querySelectorAll('.seg button').forEach(b=>{
    b.onclick=()=>{ view.calc.currency=b.dataset.cur; reRender(); };
  });
}

// Actualiza sólo el bloque de resultado (sin recrear inputs → no pierde foco)
function updateResult(sheet){
  const r=computeViability(view.calc);
  const card=sheet.querySelector('.calc-card');
  if(!card) return;
  // localizar contenedor de resultado existente
  let resultArea=card.querySelector('.result-area');
  if(!resultArea){
    // envolver para futuras actualizaciones
    resultArea=document.createElement('div');
    resultArea.className='result-area';
    const anchor=card.querySelector('.suggest');
    // insertar antes de suggest o al final
    const placeholder=card.querySelector('.result, [data-empty]');
  }
  // simplest robust approach: regenerar verdict + result inline
  const old=card.querySelector('.result'); const oldV=card.querySelector('.verdict'); const oldE=card.querySelector('[data-empty]');
  [old,oldV,oldE].forEach(n=>n&&n.remove());
  const suggest=card.querySelector('.suggest');
  let html='';
  if(r){
    let cls,txt;
    if(r.margin>=50){cls='v-good';txt='Excelente compra · margen alto';}
    else if(r.margin>=30){cls='v-good';txt='Buena compra';}
    else if(r.margin>=15){cls='v-mid';txt='Margen ajustado · evalúa';}
    else if(r.margin>=0){cls='v-bad';txt='Margen muy bajo · cuidado';}
    else {cls='v-bad';txt='Pérdida · no comprar a este precio';}
    html=`<div class="result">
      <div class="box box-profit ${r.profit<0?'neg':''}"><div class="lbl">Ganancia</div><div class="val">${fmtCOP(r.profit)}</div></div>
      <div class="box box-margin"><div class="lbl">Margen</div><div class="val">${r.margin>=0?'+':''}${Math.round(r.margin)}%</div></div>
    </div><div class="verdict ${cls}">${txt}</div>`;
  }else{
    html=`<div data-empty style="color:var(--muted);font-size:13px;text-align:center;padding:6px 0;">Ingresa costo y precio de venta para ver la ganancia.</div>`;
  }
  if(suggest) suggest.insertAdjacentHTML('beforebegin',html);
  else card.insertAdjacentHTML('beforeend',html);
}

function closeDetail(){
  const sheet=document.getElementById('detailSheet');
  if(!sheet) return;
  sheet.classList.remove('open');
  view.selectedId=null;
  view.calc.cost=''; view.calc.sale=''; view.calc._touchedCost=false; view.calc._touchedSale=false;
  view.calc.currency='USD'; view.calc.trm=DATA.globalTRM||4050;
  setTimeout(()=>sheet.remove(),280);
}

// ─── Binds globales ───
function bindControls(){
  const s=document.getElementById('searchInput');
  if(s) s.oninput=e=>{ view.search=e.target.value; const sc=window.scrollY; renderListOnly(); };
  document.querySelectorAll('[data-cat]').forEach(b=>b.onclick=()=>{ view.cat=b.dataset.cat; render(); });
  document.querySelectorAll('[data-sort]').forEach(b=>b.onclick=()=>{ view.sort=b.dataset.sort; render(); });
  const bs=document.getElementById('brandSel');
  if(bs) bs.onchange=e=>{ view.brand=e.target.value; render(); };
  document.querySelectorAll('.pcard').forEach(c=>c.onclick=()=>{ view.selectedId=c.dataset.id; renderDetail(); });
}

// Re-render sólo lista (para que el teclado de búsqueda no se cierre)
function renderListOnly(){
  const app=document.getElementById('app');
  // reemplazar sólo .count + .list
  const oldCount=app.querySelector('.count'); const oldList=app.querySelector('.list'); const oldEmpty=app.querySelector('.list')?null:app.querySelector('.controls + .empty');
  const tmp=document.createElement('div'); tmp.innerHTML=renderList();
  // quitar nodos antiguos de lista
  app.querySelectorAll('.count, .list').forEach(n=>n.remove());
  const updatebar=app.querySelector('.updatebar');
  while(tmp.firstChild){ app.insertBefore(tmp.firstChild, updatebar); }
  document.querySelectorAll('.pcard').forEach(c=>c.onclick=()=>{ view.selectedId=c.dataset.id; renderDetail(); });
}

// ─── Init ───
loadData();
render();
</script>
